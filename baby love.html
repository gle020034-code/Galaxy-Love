<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Beating Heart</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffebee; /* Light pink background */
            margin: 0;
        }

        /* The main heart container */
        .heart {
            position: relative;
            width: 100px;
            height: 100px;
            background-color: #e91e63; /* Heart color */
            transform: rotate(-45deg);
            animation: beat 0.8s infinite alternate;
            box-shadow: 0 0 30px rgba(233, 30, 99, 0.4);
        }

        /* Creating the rounded tops of the heart */
        .heart::before,
        .heart::after {
            content: "";
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #e91e63;
            border-radius: 50%;
        }

        .heart::before {
            top: -50px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: 50px;
        }

        /* Animation Keyframes */
        @keyframes beat {
            0% {
                transform: rotate(-45deg) scale(1);
            }
            100% {
                transform: rotate(-45deg) scale(1.2);
            }
        }
    </style>
</head>
<body>

    <div class="heart"></div>

</body>
</html>
