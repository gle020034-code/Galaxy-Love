<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galaxy Love Pro</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: monospace;
}

/* Center text */
.center-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 2rem;
    letter-spacing: 2px;
    text-shadow: 0 0 20px pink, 0 0 40px red, 0 0 80px purple;
}

/* Hearts */
.heart {
    position: absolute;
    color: pink;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div class="center-text">❤️ LOVE YOU ❤️</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 800; i++) {
    particles.push({
        angle: Math.random() * 2 * Math.PI,
        radius: Math.random() * 300,
        speed: Math.random() * 0.02,
        size: Math.random() * 2
    });
}

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.angle += p.speed;

        let x = canvas.width/2 + Math.cos(p.angle) * p.radius;
        let y = canvas.height/2 + Math.sin(p.angle) * p.radius;

        ctx.beginPath();
        ctx.arc(x, y, p.size, 0, Math.PI*2);
        ctx.fillStyle = "white";
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

draw();

/* Heart generator */
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = window.innerHeight + "px";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 200);
</script>

</body>
</html>
